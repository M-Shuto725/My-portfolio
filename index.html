<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>ポートフォリオ</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background-color: #f5f5f5;
    }

    .container {
      width: 80%;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0,1);
    }

    a {
      text-decoration: none;
      color: blue;
    }
  </style>
</head>

<body>
  <div class="container"></div>
    <h1>ポートフォリオ</h1>

    <p>プログラミング学習中、Webアプリを制作しています。</p>

    <h2>作品一覧</h2>

    <div class="card">
      <h3>数当てゲーム</h3>
      <p>JavaScriptを使って作成したシンプルなゲームです。<br>条件分岐やDOM操作の学習として制作しました。</p>
      <a href="https://m-shuto725.github.io/number-game/">プレイする</a>
    </div>

    <div class="card">
      <h3>ToDoアプリ</h3>
      <p>
        JavaScriptで作成したタスク管理アプリです。<br>
        localStorageを使ってデータ保存を実装しています。
      </p>
      <a href="https://m-shuto725.github.io/todo-app/">アプリを開く</a>
    </div>

    <div class="card">
      <h3>クイズアプリ</h3>
      <p>JavaScriptで作成したクイズアプリです。複数問題とスコア機能が付いています。</p>
      <a href="https://m-shuto725.github.io/quiz-app/">プレイする</a>
    </div>
    
  </div>
  
</body>
</html>
